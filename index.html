  <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        /* Mengatur latar belakang halaman */
        body {
            margin: 0;
            padding: 0;
            background-color: #121212; /* Warna gelap agar fokus ke video */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Kontainer Utama Video (Ukuran disesuaikan dengan layar HP) */
        .video-wrapper {
            width: 100%;
            max-width: 450px; /* Batas maksimal lebar agar proporsional */
            background-color: #000;
            border-radius: 12px; /* Membuat sudut video sedikit melengkung rapi */
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        }

        /* Mengatur Video HTML5 agar Responsif */
        .video-wrapper video {
            width: 100%;
            display: block;
            object-fit: contain; /* Menjaga rasio video asli */
        }
    </style>
</head>
<body>

<div class="video-wrapper">
    <video controls poster="link-gambar-cover.jpg">
        <source src="https://github.com/user-attachments/assets/666724c0-129d-4866-b2e6-b940a97e7f8c" type="video/mp4">
        Browser Anda tidak mendukung pemutar video ini.
    </video>
</div>

</body>
</html>
